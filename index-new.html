<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0A0A0A">
    <meta name="description" content="Upload or snap a photo of any toy and watch it come alive as a talking character powered by AI.">

    <title>Vivitoy — Bring Your Toys to Life</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style-new.css">

    <!-- SVG Noise Texture -->
    <svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" id="noise" style="position: fixed; top: 0; left: 0; z-index: 1; pointer-events: none;">
        <filter id="noise">
            <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" stitchTiles="stitch"/>
        </filter>
        <rect width="100%" height="100%" filter="url(#noise)" opacity="0.05"/>
    </svg>
</head>
<body>

    <!-- Floating Blob Background 1 -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="blob blob-4"></div>

    <!-- Camera Modal -->
    <div id="camera-modal" class="modal hidden">
        <div class="modal-backdrop"></div>
        <div class="camera-modal-content">
            <div class="camera-header">
                <h3>📷 Take a Photo</h3>
                <button id="close-camera" class="icon-btn" title="Close">✕</button>
            </div>
            <div class="camera-viewfinder">
                <video id="camera-video" autoplay playsinline muted></video>
                <canvas id="camera-canvas" class="hidden"></canvas>
                <div class="camera-overlay">
                    <div class="camera-frame"></div>
                </div>
            </div>
            <div class="camera-controls">
                <button id="switch-camera" class="icon-btn camera-switch-btn" title="Switch camera">🔄</button>
                <button id="capture-photo" class="camera-shutter-btn" title="Take photo">
                    <div class="shutter-inner"></div>
                </button>
                <div style="width:48px"></div>
            </div>
        </div>
    </div>

    <!-- ========== SCREEN 1: UPLOAD ========== -->
    <section id="screen-upload" class="screen active">
        <!-- Floating Panel -->
        <div class="panel upload-panel">
            <div class="panel-content">
                <div class="hero-text">
                    <div class="logo-badge">
                        <span class="logo-icon">🧸</span>
                        <span class="logo-name">VIVITOY</span>
                    </div>
                    <h1 class="hero-title">
                        <span>Bring Your Toys to Life</span>
                        <span class="hero-subtitle-line">✨</span>
                    </h1>
                    <p class="hero-subtitle">Snap or upload a photo of any toy and watch it transform into a talking, real character</p>
                </div>

                <!-- Drop Zone -->
                <div id="drop-zone" class="drop-zone">
                    <div class="drop-zone-inner">
                        <div class="upload-icon">
                            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
                                <polyline points="17 8 12 3 7 8"/>
                                <line x1="12" y1="3" x2="12" y2="15"/>
                            </svg>
                        </div>
                        <p class="drop-text">Drag & drop your toy image</p>
                        <p class="drop-subtext">or choose an option below</p>
                        <div class="upload-buttons">
                            <label for="file-input" class="btn btn-secondary" id="browse-btn">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                                Browse Files
                            </label>
                            <button id="camera-btn" class="btn btn-secondary">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>
                                Take Photo
                            </button>
                        </div>
                        <input type="file" id="file-input" accept="image/*" hidden>
                        <p class="file-types">Supports JPG, PNG, WebP</p>
                    </div>
                </div>

                <!-- Image Preview -->
                <div id="preview-area" class="preview-area hidden">
                    <div class="preview-panel">
                        <img id="preview-img" alt="Toy preview">
                        <div class="description-field">
                            <label for="toy-description" class="description-label">✏️ Describe your toy <span class="optional-tag">(optional)</span></label>
                            <textarea id="toy-description" placeholder="e.g. A blue teddy bear with a red bow tie, my childhood favorite..." rows="2" maxlength="300"></textarea>
                            <div class="char-count"><span id="char-count">0</span>/300</div>
                        </div>
                        <div class="preview-actions">
                            <button id="change-image" class="btn btn-ghost">← Change</button>
                            <button id="bring-to-life" class="btn btn-brutal">
                                <span class="btn-sparkle">✨</span> Bring to Life
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Floating Particles -->
        <div class="particles" id="particles"></div>
    </section>

    <!-- ========== SCREEN 2: LOADING ========== -->
    <section id="screen-loading" class="screen">
        <div class="loading-container">
            <div class="magic-circle">
                <div class="magic-ring ring-1"></div>
                <div class="magic-ring ring-2"></div>
                <div class="magic-ring ring-3"></div>
                <div class="magic-core">
                    <img id="loading-img" alt="Your toy">
                </div>
            </div>
            <h2 class="loading-text">
                <span id="loading-status">Analyzing your toy...</span>
            </h2>
            <div class="loading-bar">
                <div class="loading-bar-fill" id="loading-bar-fill"></div>
            </div>
        </div>
    </section>

    <!-- ========== SCREEN 3: CHARACTER ========== -->
    <section id="screen-character" class="screen">
        <div class="character-layout">
            <!-- Character Display -->
            <div class="character-display">
                <div class="character-image-wrapper" id="character-image-wrapper">
                    <div class="glow-ring"></div>
                    <div class="sparkles" id="sparkles"></div>
                    <img id="character-img" alt="Your alive toy">
                </div>
                <div class="character-panel">
                    <h2 id="character-name" class="character-name"></h2>
                    <p id="character-personality" class="character-personality"></p>
                    <div id="character-traits" class="character-traits"></div>
                </div>
            </div>

            <!-- Chat Interface -->
            <div class="chat-container">
                <div class="chat-header">
                    <h3>💬 Chat with <span id="chat-character-name"></span></h3>
                    <button id="mute-btn" class="icon-btn" title="Toggle voice">🔊</button>
                </div>
                <div class="chat-messages" id="chat-messages"></div>
                <div class="chat-input-area">
                    <input type="text" id="chat-input" placeholder="Say something..." autocomplete="off">
                    <button id="voice-input-btn" class="icon-btn mic-btn" title="Voice input">🎤</button>
                    <button id="send-btn" class="btn btn-brutal btn-send" title="Send">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                    </button>
                </div>
            </div>
        </div>

        <button id="new-toy-btn" class="btn btn-ghost new-toy-btn">← Try Another Toy</button>
    </section>

    <script src="api.js"></script>
    <script src="speech.js"></script>
    <script src="animations.js"></script>
    <script src="app.js"></script>
</body>
</html>
